name: Generar DiosnicioOS ISO
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4
      - name: Construir ISO
        run: |
          sudo bash build.sh
      - name: Subir ISO
        uses: actions/upload-artifact@v4
        with:
          name: DiosnicioOS_v1_ISO
          path: DiosnicioOS_v1.iso
